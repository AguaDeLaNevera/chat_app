  db:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: chat_db
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-network
    ports:
      - "27017:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })" ]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      restart_policy:
        condition: on-failure

  app:
    image: chat-app
    environment:
#      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:${DB_PORT}/${DB_NAME}
#      - SPRING_DATASOURCE_USERNAME=${DB_USER}
#      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_MONGODB_URI=mongodb://db:27017/chat_db
    networks:
      - backend-network
    ports:
      - "8080:8080"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

volumes:
#  postgres-data:
  mongo-data:

networks:
  backend-network:
    driver: overlay
    attachable: true