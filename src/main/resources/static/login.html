<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script>
        window.location.replace("/react/login.html");
    </script>
    <link rel="stylesheet" href="login/login.css">
</head>
<body>

<div class="container">

    <h1>Login</h1>

    <input
            id="username"
            type="text"
            placeholder="Username">

    <input
            id="password"
            type="password"
            placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <p id="error"></p>

    <p>
        Don't have an account?
        <a href="register.html">Register</a>
    </p>

</div>

<script src="login/login.js"></script>

</body>
</html>
